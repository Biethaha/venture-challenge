<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venture Challenge - BWL Investment Game</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); min-height: 100vh; }
    input[type="range"] { -webkit-appearance: none; appearance: none; height: 8px; border-radius: 4px; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #fff; border-radius: 50%; cursor: pointer; }
    input, select { padding: 0.8rem 1rem; background: #1e1e30; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1rem; width: 100%; outline: none; }
    input:focus, select:focus { border-color: #e94560; }
    textarea { padding: 0.8rem 1rem; background: #1e1e30; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1rem; width: 100%; outline: none; resize: vertical; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.5s ease forwards; }
    .live-indicator { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.8rem; background: rgba(78,205,196,0.2); border-radius: 20px; font-size: 0.75rem; color: #4ECDC4; }
    .live-indicator::before { content: ''; width: 8px; height: 8px; background: #4ECDC4; border-radius: 50%; animation: pulse 1s infinite; }
    .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #e94560, #ff6b6b); color: #fff; }
    .btn-success { background: linear-gradient(135deg, #4ECDC4, #45B7D1); color: #1a1a2e; }
    .btn-secondary { background: transparent; border: 1px solid #333; color: #a0a0a0; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .card { background: linear-gradient(135deg, #1e1e30, #252540); border-radius: 12px; padding: 1.5rem; border: 1px solid #333; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab { padding: 0.6rem 1.2rem; background: transparent; border: 1px solid #333; border-radius: 8px; color: #a0a0a0; cursor: pointer; font-size: 0.9rem; }
    .tab.active { background: #e94560; border-color: #e94560; color: #fff; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #333; }
    th { color: #a0a0a0; font-weight: 600; font-size: 0.85rem; }
    td { color: #fff; font-size: 0.9rem; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .badge-success { background: rgba(78,205,196,0.2); color: #4ECDC4; }
    .badge-warning { background: rgba(255,234,167,0.2); color: #FFEAA7; }
    .badge-danger { background: rgba(233,69,96,0.2); color: #e94560; }
    .color-picker { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .color-option { width: 32px; height: 32px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .color-option:hover { transform: scale(1.1); }
    .color-option.selected { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal { max-width: 500px; width: 90%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const formatCurrency = (amount) => `${amount.toLocaleString('de-DE')} €`;
    const generateCode = (len = 6) => {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < len; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    };

    const COLORS = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9'];
    const DEFAULT_SLOGANS = ['Disruptive Vertriebskanäle', 'KI-gestützte Kundenakquise', 'Nachhaltige B2B-Strategie', 'Omnichannel-Excellence', 'Data-Driven Sales', 'Customer-First Approach', 'Agile Market Expansion', 'Digital Transformation', 'Innovation Leadership', 'Smart Distribution'];

    const generateDefaultCompanies = (count) => {
      const prefixes = ['Alpha', 'Beta', 'Gamma', 'Delta', 'Epsilon', 'Zeta', 'Omega', 'Nova', 'Apex', 'Prime'];
      const suffixes = ['Ventures', 'Solutions', 'Group', 'Dynamics', 'Edge', 'Labs', 'Systems', 'Tech', 'Digital', 'Strategy'];
      return Array(count).fill(null).map((_, i) => ({
        id: i + 1, name: `${prefixes[i % prefixes.length]} ${suffixes[i % suffixes.length]}`,
        slogan: DEFAULT_SLOGANS[i % DEFAULT_SLOGANS.length], color: COLORS[i % COLORS.length], members: []
      }));
    };

    const calculateOptimalParams = (studentCount) => {
      let n = Math.round(studentCount / 4.5);
      n = Math.max(3, Math.min(n, Math.floor(studentCount / 3)));
      const m = Math.max(2, Math.ceil(n / 3));
      const baseSize = Math.floor(studentCount / n);
      const remainder = studentCount % n;
      return { groups: n, minInvestments: m, groupSizes: Array(n).fill(baseSize).map((s, i) => i < remainder ? s + 1 : s), studentsPerGroup: `${baseSize}${remainder > 0 ? `-${baseSize + 1}` : ''}` };
    };

    const Storage = {
      saveSession: (session) => { localStorage.setItem(`vc_session_${session.code}`, JSON.stringify(session)); window.dispatchEvent(new CustomEvent('session-updated', { detail: { code: session.code } })); },
      getSession: (code) => { const data = localStorage.getItem(`vc_session_${code}`); return data ? JSON.parse(data) : null; },
      getAllSessions: () => {
        const sessions = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key?.startsWith('vc_session_')) { try { sessions.push(JSON.parse(localStorage.getItem(key))); } catch {} }
        }
        return sessions.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      },
      updateSession: (code, updates) => {
        const session = Storage.getSession(code);
        if (session) { const updated = { ...session, ...updates, lastUpdated: Date.now() }; localStorage.setItem(`vc_session_${code}`, JSON.stringify(updated)); window.dispatchEvent(new CustomEvent('session-updated', { detail: { code } })); return updated; }
        return null;
      },
      saveLogin: (data) => { localStorage.setItem('vc_login', JSON.stringify(data)); },
      getLogin: () => { try { return JSON.parse(localStorage.getItem('vc_login')); } catch { return null; } },
      clearLogin: () => { localStorage.removeItem('vc_login'); }
    };

    const useLiveSession = (code, initial) => {
      const [session, setSession] = useState(initial);
      useEffect(() => {
        if (!code) return;
        const refresh = () => { const s = Storage.getSession(code); if (s && JSON.stringify(s) !== JSON.stringify(session)) setSession(s); };
        refresh();
        const interval = setInterval(refresh, 2000);
        const handler = (e) => { if (e.detail?.code === code) refresh(); };
        window.addEventListener('session-updated', handler);
        return () => { clearInterval(interval); window.removeEventListener('session-updated', handler); };
      }, [code]);
      const update = useCallback((updates) => { const u = Storage.updateSession(code, updates); if (u) setSession(u); return u; }, [code]);
      return [session, setSession, update];
    };

    // PDF für Ergebnisse
    const generatePDF = (session, userName = null) => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      let y = 20;
      doc.setFontSize(20); doc.setTextColor(233, 69, 96);
      doc.text('VENTURE CHALLENGE', 105, y, { align: 'center' }); y += 10;
      doc.setFontSize(14); doc.setTextColor(100);
      doc.text(session.courseName, 105, y, { align: 'center' }); y += 15;
      doc.setFontSize(10); doc.setTextColor(60);
      doc.text(`Session: ${session.code} | Datum: ${new Date().toLocaleDateString('de-DE')}`, 20, y); y += 15;

      const rankings = session.companies.map(c => {
        const total = Object.values(session.investments).flatMap(inv => Object.entries(inv)).filter(([id]) => parseInt(id) === c.id).reduce((sum, [, amt]) => sum + amt, 0);
        return { ...c, total };
      }).sort((a, b) => b.total - a.total).map((c, i) => ({ ...c, rank: i + 1 }));

      doc.setFontSize(14); doc.setTextColor(0); doc.text('Unternehmens-Ranking', 20, y); y += 8;
      rankings.forEach((r) => { doc.setFontSize(10); doc.text(`${r.rank}. ${r.name}: ${r.total.toLocaleString('de-DE')} EUR`, 25, y); y += 6; }); y += 10;

      doc.setFontSize(14); doc.text('Auszahlungslogik', 20, y); y += 8;
      doc.setFontSize(10); doc.setTextColor(60);
      doc.text('1. Platz: Investment x 5 | 2. Platz: Investment x 1 | Andere: 0', 25, y); y += 15;

      const investorReturns = Object.entries(session.investments).map(([inv, invs]) => {
        let ret = 0;
        Object.entries(invs).forEach(([cId, amt]) => { const rank = rankings.find(r => r.id === parseInt(cId))?.rank; if (rank === 1) ret += amt * 5; else if (rank === 2) ret += amt; });
        return { investor: inv, returned: ret, profit: ret - 1000 };
      }).sort((a, b) => b.returned - a.returned);

      doc.setTextColor(0); doc.setFontSize(14); doc.text('Investor-Rangliste', 20, y); y += 8;
      investorReturns.slice(0, 20).forEach((inv, i) => {
        if (y > 270) { doc.addPage(); y = 20; }
        doc.setFontSize(10);
        doc.text(`${inv.investor === userName ? '> ' : '  '}${i + 1}. ${inv.investor}: ${inv.returned.toLocaleString('de-DE')} EUR (${inv.profit >= 0 ? '+' : ''}${inv.profit.toLocaleString('de-DE')})`, 25, y);
        y += 6;
      });

      if (userName && session.investments[userName]) {
        y += 10; if (y > 240) { doc.addPage(); y = 20; }
        doc.setFontSize(14); doc.text(`Details: ${userName}`, 20, y); y += 10;
        const userInv = session.investments[userName];
        Object.entries(userInv).forEach(([cId, amt]) => {
          if (amt > 0) {
            const c = rankings.find(r => r.id === parseInt(cId));
            const gain = c.rank === 1 ? amt * 5 : c.rank === 2 ? amt : 0;
            doc.setFontSize(10);
            doc.text(`${c.name} (Platz ${c.rank}): ${amt} EUR -> ${gain} EUR`, 25, y); y += 6;
          }
        });
      }
      doc.save(`VentureChallenge_${session.code}.pdf`);
    };

    // PDF Anleitung für Teilnehmer
    const generateParticipantGuidePDF = () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      let y = 20;

      doc.setFontSize(22); doc.setTextColor(78, 205, 196);
      doc.text('VENTURE CHALLENGE', 105, y, { align: 'center' }); y += 10;
      doc.setFontSize(16); doc.setTextColor(100);
      doc.text('Anleitung fuer Teilnehmer', 105, y, { align: 'center' }); y += 20;

      doc.setFontSize(14); doc.setTextColor(0);
      doc.text('Was ist die Venture Challenge?', 20, y); y += 8;
      doc.setFontSize(10); doc.setTextColor(60);
      const intro = 'Die Venture Challenge ist ein interaktives Investment-Planspiel. Du schluepfst in die Rolle eines Investors und entscheidest, welche Unternehmen (Teams) das groesste Potenzial haben.';
      const introLines = doc.splitTextToSize(intro, 170);
      introLines.forEach(line => { doc.text(line, 20, y); y += 5; }); y += 10;

      doc.setFontSize(14); doc.setTextColor(0);
      doc.text('So funktioniert es:', 20, y); y += 10;

      const steps = [
        '1. REGISTRIERUNG',
        '   - Oeffne den Link oder gib den Session-Code ein',
        '   - Waehle einen Nutzernamen und ein Kennwort',
        '   - Tritt einem Team/Unternehmen bei',
        '',
        '2. INVESTMENT-PHASE',
        '   - Du erhaeltst ein virtuelles Budget von 1.000 EUR',
        '   - Verteile dein Budget auf verschiedene Teams',
        '   - Du musst in mindestens 2 verschiedene Teams investieren',
        '   - Begruende jede Investitionsentscheidung',
        '',
        '3. AUFLOESUNG',
        '   - Der Dozent enthuellt die Ergebnisse',
        '   - Teams werden nach erhaltenem Kapital gerankt',
        '',
        '4. AUSZAHLUNG',
        '   - 1. Platz: Dein Investment x 5 (500% Rendite!)',
        '   - 2. Platz: Dein Investment x 1 (Einsatz zurueck)',
        '   - Alle anderen: Investment verloren',
        '',
        '5. GEWINNER',
        '   - Wer am Ende das meiste Geld hat, gewinnt!'
      ];

      doc.setFontSize(10);
      steps.forEach(step => {
        if (y > 270) { doc.addPage(); y = 20; }
        doc.setTextColor(step.startsWith('   ') ? 80 : 0);
        doc.text(step, 20, y); y += 5;
      }); y += 10;

      doc.setFontSize(14); doc.setTextColor(0);
      doc.text('Tipps fuer eine gute Strategie:', 20, y); y += 8;
      doc.setFontSize(10); doc.setTextColor(60);
      const tips = [
        '- Hoere dir alle Pitches genau an',
        '- Diversifiziere: Setze nicht alles auf ein Team',
        '- Bedenke: Viele werden auf den Favoriten setzen',
        '- Manchmal gewinnt der Underdog!'
      ];
      tips.forEach(tip => { doc.text(tip, 20, y); y += 5; }); y += 10;

      doc.setFontSize(12); doc.setTextColor(78, 205, 196);
      doc.text('Viel Erfolg bei der Venture Challenge!', 105, y, { align: 'center' });

      doc.save('VentureChallenge_Anleitung_Teilnehmer.pdf');
    };

    // PDF Anleitung für Spielleiter
    const generateInstructorGuidePDF = () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      let y = 20;

      doc.setFontSize(22); doc.setTextColor(233, 69, 96);
      doc.text('VENTURE CHALLENGE', 105, y, { align: 'center' }); y += 10;
      doc.setFontSize(16); doc.setTextColor(100);
      doc.text('Anleitung fuer Spielleiter', 105, y, { align: 'center' }); y += 20;

      doc.setFontSize(14); doc.setTextColor(0);
      doc.text('Uebersicht', 20, y); y += 8;
      doc.setFontSize(10); doc.setTextColor(60);
      const intro = 'Die Venture Challenge ist ein gamifiziertes Lernspiel fuer BWL-Kurse. Studierende pitchen ihre Geschaeftsideen und investieren anschliessend virtuelles Kapital in die ueberzeugendsten Konzepte.';
      const introLines = doc.splitTextToSize(intro, 170);
      introLines.forEach(line => { doc.text(line, 20, y); y += 5; }); y += 10;

      doc.setFontSize(14); doc.setTextColor(0);
      doc.text('Spielablauf:', 20, y); y += 10;

      const phases = [
        'PHASE 1: VORBEREITUNG',
        '   - Neues Spiel erstellen (Kursname, Teilnehmerzahl)',
        '   - Optional: Gruppennamen anpassen',
        '   - Session-Code an Studierende verteilen',
        '',
        'PHASE 2: REGISTRIERUNG',
        '   - Studierende registrieren sich mit dem Code',
        '   - Jeder waehlt ein Team/Unternehmen',
        '   - Warten bis alle registriert sind',
        '',
        'PHASE 3: PITCHES (offline)',
        '   - Jedes Team praes. seine Geschaeftsidee',
        '   - Empfohlen: 5-10 Min. pro Team',
        '',
        'PHASE 4: INVESTMENT',
        '   - Investment-Phase im System starten',
        '   - Studierende verteilen 1.000 EUR Budget',
        '   - Jeder muss mind. 2 Teams waehlen',
        '   - Warten bis alle investiert haben',
        '',
        'PHASE 5: AUFLOESUNG',
        '   - Spannung aufbauen: Plaetze einzeln enthuellen',
        '   - Vom letzten zum ersten Platz',
        '',
        'PHASE 6: ERGEBNISSE',
        '   - Ergebnisse fuer Teilnehmer freigeben',
        '   - PDF-Export fuer Dokumentation'
      ];

      doc.setFontSize(10);
      phases.forEach(phase => {
        if (y > 270) { doc.addPage(); y = 20; }
        doc.setTextColor(phase.startsWith('   ') ? 80 : 0);
        doc.text(phase, 20, y); y += 5;
      }); y += 10;

      if (y > 240) { doc.addPage(); y = 20; }
      doc.setFontSize(14); doc.setTextColor(0);
      doc.text('Auszahlungslogik:', 20, y); y += 8;
      doc.setFontSize(10); doc.setTextColor(60);
      doc.text('1. Platz: Investment x 5 (500% Rendite)', 20, y); y += 5;
      doc.text('2. Platz: Investment x 1 (Einsatz zurueck)', 20, y); y += 5;
      doc.text('Andere Plaetze: Investment verloren', 20, y); y += 10;

      doc.setFontSize(14); doc.setTextColor(0);
      doc.text('Admin-Funktionen:', 20, y); y += 8;
      doc.setFontSize(10); doc.setTextColor(60);
      const features = [
        '- Teilnehmer verwalten (loeschen, Passwort reset)',
        '- Investments einsehen und korrigieren',
        '- Gruppennamen jederzeit aendern',
        '- PDF-Export der Ergebnisse'
      ];
      features.forEach(f => { doc.text(f, 20, y); y += 5; }); y += 10;

      doc.setFontSize(14); doc.setTextColor(0);
      doc.text('Technische Hinweise:', 20, y); y += 8;
      doc.setFontSize(10); doc.setTextColor(60);
      const tech = [
        '- Daten werden im Browser gespeichert (localStorage)',
        '- Alle muessen denselben Browser/Geraet nutzen',
        '- Oder: Auf Webserver hosten (z.B. GitHub Pages)',
        '- Live-Sync funktioniert zwischen Browser-Tabs'
      ];
      tech.forEach(t => { doc.text(t, 20, y); y += 5; });

      doc.save('VentureChallenge_Anleitung_Spielleiter.pdf');
    };

    // ============ START SCREEN ============
    const StartScreen = ({ onSelectRole, sessions, savedLogin }) => {
      const [showLogin, setShowLogin] = useState(null);
      const [code, setCode] = useState('');
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleStudentLogin = () => {
        const session = Storage.getSession(code.toUpperCase());
        if (!session) { setError('Session nicht gefunden.'); return; }
        const user = session.participants[username];
        if (!user) { setError('Nutzername nicht gefunden.'); return; }
        if (user.password !== password) { setError('Falsches Kennwort.'); return; }
        Storage.saveLogin({ type: 'student', sessionCode: session.code, username });
        onSelectRole('student-login', session, username);
      };

      const handleAdminLogin = () => {
        const session = Storage.getSession(code.toUpperCase());
        if (!session) { setError('Session nicht gefunden.'); return; }
        if (session.adminPassword !== password) { setError('Falsches Admin-Kennwort.'); return; }
        Storage.saveLogin({ type: 'admin', sessionCode: session.code });
        onSelectRole('admin', session);
      };

      if (savedLogin) {
        const session = Storage.getSession(savedLogin.sessionCode);
        if (session && (savedLogin.type === 'admin' || session.participants[savedLogin.username])) {
          return (
            <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '2rem' }}>
              <div className="fade-in card" style={{ maxWidth: '400px', width: '100%', textAlign: 'center' }}>
                <p style={{ color: '#a0a0a0', marginBottom: '1rem' }}>Willkommen zurück{savedLogin.type === 'student' ? `, ${savedLogin.username}` : ''}!</p>
                <button className="btn btn-primary" style={{ width: '100%', marginBottom: '0.5rem' }}
                  onClick={() => onSelectRole(savedLogin.type === 'admin' ? 'admin' : 'student-login', session, savedLogin.username)}>
                  {savedLogin.type === 'admin' ? '👨‍🏫 Weiter als Spielleiter' : '👤 Weiter zum Spiel'} ({session.code})
                </button>
                <button className="btn btn-secondary" style={{ width: '100%' }} onClick={() => { Storage.clearLogin(); window.location.reload(); }}>Anderes Konto</button>
              </div>
            </div>
          );
        }
      }

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '2rem' }}>
          <div className="fade-in" style={{ textAlign: 'center', maxWidth: '500px', width: '100%' }}>
            <div style={{ width: '80px', height: '80px', margin: '0 auto 1.5rem', background: 'linear-gradient(135deg, #e94560, #ff6b6b)', borderRadius: '20px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '2.5rem' }}>💰</div>
            <h1 style={{ fontSize: '2.5rem', fontWeight: '800', background: 'linear-gradient(90deg, #fff, #e94560)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '0.5rem' }}>VENTURE CHALLENGE</h1>
            <p style={{ color: '#a0a0a0', fontSize: '1.1rem', marginBottom: '2rem' }}>Gamifiziertes BWL Investment-Lernspiel</p>
            
            {!showLogin && (
              <>
                <div style={{ display: 'grid', gap: '1rem' }}>
                  <button className="btn btn-primary" style={{ padding: '1.5rem', fontSize: '1.1rem', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '1rem' }} onClick={() => onSelectRole('admin-new')}>
                    <span style={{ fontSize: '2rem' }}>👨‍🏫</span>
                    <div style={{ textAlign: 'left' }}><div>Neues Spiel erstellen</div><div style={{ fontSize: '0.8rem', opacity: 0.8 }}>Als Spielleiter</div></div>
                  </button>
                  <button className="btn" style={{ padding: '1.5rem', fontSize: '1.1rem', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '1rem', background: 'linear-gradient(135deg, #1e1e30, #252540)', border: '2px solid #4ECDC4' }} onClick={() => onSelectRole('student-register')}>
                    <span style={{ fontSize: '2rem' }}>✏️</span>
                    <div style={{ textAlign: 'left', color: '#fff' }}><div>Neu registrieren</div><div style={{ fontSize: '0.8rem', opacity: 0.8 }}>Erstmalig beitreten</div></div>
                  </button>
                  <button className="btn btn-secondary" style={{ padding: '1rem' }} onClick={() => setShowLogin('student')}>👤 Als Teilnehmer einloggen</button>
                  <button className="btn btn-secondary" style={{ padding: '1rem' }} onClick={() => setShowLogin('admin')}>🔑 Als Spielleiter einloggen</button>
                </div>

                {/* PDF Download Buttons */}
                <div style={{ marginTop: '2rem', paddingTop: '1.5rem', borderTop: '1px solid #333' }}>
                  <p style={{ color: '#666', fontSize: '0.85rem', marginBottom: '1rem' }}>📄 Anleitungen herunterladen:</p>
                  <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'center', flexWrap: 'wrap' }}>
                    <button onClick={generateParticipantGuidePDF} style={{ padding: '0.6rem 1rem', background: 'rgba(78,205,196,0.2)', border: '1px solid #4ECDC4', borderRadius: '8px', color: '#4ECDC4', cursor: 'pointer', fontSize: '0.85rem', fontWeight: '600' }}>
                      📥 Anleitung Teilnehmer
                    </button>
                    <button onClick={generateInstructorGuidePDF} style={{ padding: '0.6rem 1rem', background: 'rgba(233,69,96,0.2)', border: '1px solid #e94560', borderRadius: '8px', color: '#e94560', cursor: 'pointer', fontSize: '0.85rem', fontWeight: '600' }}>
                      📥 Anleitung Spielleiter
                    </button>
                  </div>
                </div>
              </>
            )}

            {showLogin === 'student' && (
              <div className="card">
                <button className="btn btn-secondary" style={{ marginBottom: '1rem' }} onClick={() => { setShowLogin(null); setError(''); }}>← Zurück</button>
                <h3 style={{ color: '#fff', marginBottom: '1rem' }}>👤 Teilnehmer-Login</h3>
                <input type="text" placeholder="Session-Code" value={code} onChange={(e) => setCode(e.target.value.toUpperCase())} style={{ marginBottom: '0.75rem', textAlign: 'center', letterSpacing: '0.2rem' }} />
                <input type="text" placeholder="Nutzername" value={username} onChange={(e) => setUsername(e.target.value)} style={{ marginBottom: '0.75rem' }} />
                <input type="password" placeholder="Kennwort" value={password} onChange={(e) => setPassword(e.target.value)} style={{ marginBottom: '0.75rem' }} />
                {error && <p style={{ color: '#e94560', fontSize: '0.9rem', marginBottom: '0.75rem' }}>⚠️ {error}</p>}
                <button className="btn btn-success" style={{ width: '100%' }} onClick={handleStudentLogin}>Einloggen</button>
              </div>
            )}

            {showLogin === 'admin' && (
              <div className="card">
                <button className="btn btn-secondary" style={{ marginBottom: '1rem' }} onClick={() => { setShowLogin(null); setError(''); }}>← Zurück</button>
                <h3 style={{ color: '#fff', marginBottom: '1rem' }}>🔑 Spielleiter-Login</h3>
                <input type="text" placeholder="Session-Code" value={code} onChange={(e) => setCode(e.target.value.toUpperCase())} style={{ marginBottom: '0.75rem', textAlign: 'center', letterSpacing: '0.2rem' }} />
                <input type="password" placeholder="Admin-Kennwort" value={password} onChange={(e) => setPassword(e.target.value)} style={{ marginBottom: '0.75rem' }} />
                {error && <p style={{ color: '#e94560', fontSize: '0.9rem', marginBottom: '0.75rem' }}>⚠️ {error}</p>}
                <button className="btn btn-primary" style={{ width: '100%' }} onClick={handleAdminLogin}>Einloggen</button>
                {sessions.length > 0 && (
                  <div style={{ marginTop: '1.5rem', borderTop: '1px solid #333', paddingTop: '1rem' }}>
                    <p style={{ color: '#666', fontSize: '0.85rem', marginBottom: '0.5rem' }}>Deine Sessions:</p>
                    {sessions.slice(0, 3).map(s => (
                      <div key={s.code} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.5rem', background: 'rgba(0,0,0,0.2)', borderRadius: '6px', marginBottom: '0.5rem' }}>
                        <span style={{ color: '#fff' }}>{s.code}</span>
                        <button className="btn btn-secondary" style={{ padding: '0.3rem 0.6rem', fontSize: '0.8rem' }} onClick={() => setCode(s.code)}>Auswählen</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    };

    // ============ STUDENT REGISTRATION ============
    const StudentRegistration = ({ onComplete, onBack }) => {
      const [step, setStep] = useState(1);
      const [code, setCode] = useState('');
      const [session, setSession] = useState(null);
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [selectedGroup, setSelectedGroup] = useState(null);
      const [error, setError] = useState('');

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const joinCode = params.get('join');
        if (joinCode) { setCode(joinCode.toUpperCase()); const s = Storage.getSession(joinCode.toUpperCase()); if (s) { setSession(s); setStep(2); } }
      }, []);

      const handleCodeSubmit = () => { const s = Storage.getSession(code.toUpperCase()); if (s) { setSession(s); setStep(2); setError(''); } else { setError('Session nicht gefunden.'); } };

      const handleRegister = () => {
        if (!username.trim() || username.length < 2) { setError('Nutzername min. 2 Zeichen.'); return; }
        if (!password || password.length < 3) { setError('Kennwort min. 3 Zeichen.'); return; }
        if (!selectedGroup) { setError('Bitte Gruppe wählen.'); return; }
        const current = Storage.getSession(session.code);
        if (current.participants[username.trim()]) { setError('Nutzername vergeben.'); return; }
        const groupIdx = current.companies.findIndex(c => c.id === selectedGroup);
        if (current.companies[groupIdx].members.length >= current.params.groupSizes[groupIdx]) { setError('Gruppe voll.'); return; }
        const updatedParticipants = { ...current.participants, [username.trim()]: { groupId: selectedGroup, password, joinedAt: Date.now() } };
        const updatedCompanies = current.companies.map(c => c.id === selectedGroup ? { ...c, members: [...c.members, username.trim()] } : c);
        Storage.updateSession(current.code, { participants: updatedParticipants, companies: updatedCompanies });
        Storage.saveLogin({ type: 'student', sessionCode: current.code, username: username.trim() });
        onComplete(Storage.getSession(current.code), username.trim());
      };

      if (step === 1) {
        return (
          <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '2rem' }}>
            <div className="fade-in card" style={{ maxWidth: '450px', width: '100%' }}>
              <button className="btn btn-secondary" style={{ marginBottom: '1rem' }} onClick={onBack}>← Zurück</button>
              <h2 style={{ color: '#fff', marginBottom: '1.5rem', textAlign: 'center' }}>✏️ Registrierung</h2>
              <input type="text" value={code} onChange={(e) => setCode(e.target.value.toUpperCase())} placeholder="SESSION-CODE" maxLength={6} style={{ textAlign: 'center', fontSize: '1.5rem', letterSpacing: '0.4rem', marginBottom: '1rem' }} onKeyPress={(e) => e.key === 'Enter' && code.length === 6 && handleCodeSubmit()} />
              {error && <p style={{ color: '#e94560', fontSize: '0.9rem', marginBottom: '0.75rem', textAlign: 'center' }}>⚠️ {error}</p>}
              <button className="btn btn-success" style={{ width: '100%' }} disabled={code.length !== 6} onClick={handleCodeSubmit}>Weiter →</button>
            </div>
          </div>
        );
      }

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '2rem' }}>
          <div className="fade-in card" style={{ maxWidth: '600px', width: '100%' }}>
            <button className="btn btn-secondary" style={{ marginBottom: '1rem' }} onClick={() => setStep(1)}>← Anderen Code</button>
            <div style={{ background: 'linear-gradient(135deg, #4ECDC4, #45B7D1)', borderRadius: '8px', padding: '1rem', marginBottom: '1.5rem' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div><div style={{ fontSize: '0.8rem', opacity: 0.8 }}>Session:</div><div style={{ fontSize: '1.2rem', fontWeight: '700' }}>{session.courseName}</div></div>
                <div style={{ background: 'rgba(0,0,0,0.2)', padding: '0.5rem 1rem', borderRadius: '6px', fontWeight: '700' }}>{session.code}</div>
              </div>
            </div>
            <h3 style={{ color: '#fff', marginBottom: '1rem' }}>Zugangsdaten</h3>
            <div style={{ display: 'grid', gap: '0.75rem', marginBottom: '1.5rem' }}>
              <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} placeholder="Nutzername (frei wählbar)" />
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Kennwort (min. 3 Zeichen)" />
            </div>
            <h3 style={{ color: '#fff', marginBottom: '1rem' }}>Gruppe wählen</h3>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '0.75rem', marginBottom: '1.5rem' }}>
              {session.companies.map((c, idx) => {
                const members = c.members.length; const max = session.params.groupSizes[idx]; const full = members >= max; const selected = selectedGroup === c.id;
                return (
                  <button key={c.id} onClick={() => !full && setSelectedGroup(c.id)} disabled={full}
                    style={{ padding: '1rem', background: selected ? c.color : 'rgba(0,0,0,0.2)', border: selected ? 'none' : `1px solid ${full ? '#333' : c.color}`, borderRadius: '8px', cursor: full ? 'not-allowed' : 'pointer', opacity: full ? 0.5 : 1, textAlign: 'left' }}>
                    <div style={{ color: selected ? '#1a1a2e' : '#fff', fontWeight: '600', fontSize: '0.9rem' }}>{c.name}</div>
                    <div style={{ color: selected ? '#1a1a2e' : '#a0a0a0', fontSize: '0.75rem' }}>{members}/{max} {full && '(voll)'}</div>
                  </button>
                );
              })}
            </div>
            {error && <p style={{ color: '#e94560', fontSize: '0.9rem', marginBottom: '0.75rem' }}>⚠️ {error}</p>}
            <button className="btn btn-primary" style={{ width: '100%' }} onClick={handleRegister}>🎮 Registrieren</button>
            <p style={{ color: '#666', fontSize: '0.8rem', marginTop: '1rem', textAlign: 'center' }}>💡 Merke dir deine Zugangsdaten!</p>
          </div>
        </div>
      );
    };

    // ============ ADMIN SETUP ============
    const AdminSetup = ({ onComplete, onBack }) => {
      const [step, setStep] = useState(1);
      const [studentCount, setStudentCount] = useState(20);
      const [courseName, setCourseName] = useState('BWL Vertriebsstrategie');
      const [adminPassword, setAdminPassword] = useState('');
      const [companies, setCompanies] = useState([]);
      const params = calculateOptimalParams(studentCount);

      useEffect(() => { setCompanies(generateDefaultCompanies(params.groups)); }, [params.groups]);

      const handleNext = () => { if (!adminPassword || adminPassword.length < 4) { alert('Admin-Kennwort min. 4 Zeichen!'); return; } setStep(2); };

      const handleCreate = () => {
        if (companies.some(c => !c.name.trim())) { alert('Alle Gruppen brauchen Namen!'); return; }
        const code = generateCode();
        const session = { code, courseName, studentCount, params, companies: companies.map(c => ({ ...c, members: [] })), participants: {}, investments: {}, phase: 'registration', revealedRanks: 0, resultsPublished: false, adminPassword, createdAt: Date.now(), lastUpdated: Date.now() };
        Storage.saveSession(session);
        Storage.saveLogin({ type: 'admin', sessionCode: code });
        onComplete(session);
      };

      if (step === 1) {
        return (
          <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '2rem' }}>
            <div className="fade-in" style={{ maxWidth: '700px', width: '100%' }}>
              <button className="btn btn-secondary" onClick={onBack} style={{ marginBottom: '1rem' }}>← Zurück</button>
              <h2 style={{ fontSize: '2rem', fontWeight: '800', color: '#fff', marginBottom: '2rem' }}>👨‍🏫 Neues Spiel - Schritt 1</h2>
              <div className="card" style={{ marginBottom: '1.5rem' }}>
                <div style={{ marginBottom: '1.5rem' }}><label style={{ color: '#a0a0a0', fontSize: '0.85rem', display: 'block', marginBottom: '0.5rem' }}>Kursname</label><input type="text" value={courseName} onChange={(e) => setCourseName(e.target.value)} /></div>
                <div style={{ marginBottom: '1.5rem' }}><label style={{ color: '#a0a0a0', fontSize: '0.85rem', display: 'block', marginBottom: '0.5rem' }}>Admin-Kennwort</label><input type="password" value={adminPassword} onChange={(e) => setAdminPassword(e.target.value)} placeholder="Min. 4 Zeichen" /></div>
                <div style={{ marginBottom: '1.5rem' }}><label style={{ color: '#a0a0a0', fontSize: '0.85rem', display: 'block', marginBottom: '0.5rem' }}>Anzahl Studierende: {studentCount}</label><input type="range" min="6" max="100" value={studentCount} onChange={(e) => setStudentCount(parseInt(e.target.value))} style={{ background: `linear-gradient(to right, #e94560 ${((studentCount - 6) / 94) * 100}%, #333 ${((studentCount - 6) / 94) * 100}%)` }} /></div>
              </div>
              <div className="card" style={{ background: 'rgba(78,205,196,0.1)', borderColor: 'rgba(78,205,196,0.3)', marginBottom: '1.5rem' }}>
                <h3 style={{ color: '#4ECDC4', marginBottom: '1rem' }}>🧮 Parameter</h3>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '1rem' }}>
                  {[{ v: params.groups, l: 'Gruppen' }, { v: params.minInvestments, l: 'Min. Inv.' }, { v: params.studentsPerGroup, l: 'Pers./Gr.' }, { v: '1.000€', l: 'Budget' }].map((x, i) => (
                    <div key={i} style={{ textAlign: 'center' }}><div style={{ fontSize: '1.8rem', fontWeight: '900', color: '#fff' }}>{x.v}</div><div style={{ color: '#a0a0a0', fontSize: '0.8rem' }}>{x.l}</div></div>
                  ))}
                </div>
              </div>
              <button className="btn btn-primary" style={{ width: '100%', padding: '1.2rem', fontSize: '1.1rem' }} onClick={handleNext}>Weiter zu Gruppennamen →</button>
            </div>
          </div>
        );
      }

      return (
        <div style={{ minHeight: '100vh', padding: '2rem' }}>
          <div className="fade-in" style={{ maxWidth: '900px', margin: '0 auto' }}>
            <button className="btn btn-secondary" onClick={() => setStep(1)} style={{ marginBottom: '1rem' }}>← Zurück</button>
            <h2 style={{ fontSize: '2rem', fontWeight: '800', color: '#fff', marginBottom: '2rem' }}>👨‍🏫 Gruppennamen - Schritt 2</h2>
            <div style={{ display: 'grid', gap: '1rem', marginBottom: '2rem' }}>
              {companies.map((company, idx) => (
                <div key={company.id} className="card" style={{ borderLeft: `4px solid ${company.color}` }}>
                  <div style={{ display: 'flex', gap: '1rem', alignItems: 'flex-start', flexWrap: 'wrap' }}>
                    <div><label style={{ color: '#a0a0a0', fontSize: '0.8rem', display: 'block', marginBottom: '0.5rem' }}>Farbe</label>
                      <div className="color-picker">{COLORS.map(color => (<div key={color} className={`color-option ${company.color === color ? 'selected' : ''}`} style={{ background: color }} onClick={() => setCompanies(prev => prev.map(c => c.id === company.id ? { ...c, color } : c))} />))}</div>
                    </div>
                    <div style={{ flex: '1', minWidth: '200px' }}><label style={{ color: '#a0a0a0', fontSize: '0.8rem', display: 'block', marginBottom: '0.5rem' }}>Name *</label><input type="text" value={company.name} onChange={(e) => setCompanies(prev => prev.map(c => c.id === company.id ? { ...c, name: e.target.value } : c))} /></div>
                    <div style={{ flex: '1', minWidth: '200px' }}><label style={{ color: '#a0a0a0', fontSize: '0.8rem', display: 'block', marginBottom: '0.5rem' }}>Slogan</label><input type="text" value={company.slogan} onChange={(e) => setCompanies(prev => prev.map(c => c.id === company.id ? { ...c, slogan: e.target.value } : c))} placeholder="Optional" /></div>
                    <div style={{ textAlign: 'center', padding: '0.5rem 1rem' }}><div style={{ color: '#a0a0a0', fontSize: '0.75rem' }}>Max.</div><div style={{ color: company.color, fontSize: '1.5rem', fontWeight: '700' }}>{params.groupSizes[idx]}</div></div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ display: 'flex', gap: '1rem' }}>
              <button className="btn btn-secondary" style={{ flex: 1 }} onClick={() => setCompanies(generateDefaultCompanies(params.groups))}>🔄 Reset</button>
              <button className="btn btn-primary" style={{ flex: 2, padding: '1.2rem', fontSize: '1.1rem' }} onClick={handleCreate}>🚀 Spiel erstellen</button>
            </div>
          </div>
        </div>
      );
    };

    // ============ ADMIN DASHBOARD ============
    const AdminDashboard = ({ initialSession, onLogout }) => {
      const [session, setSession, updateSession] = useLiveSession(initialSession.code, initialSession);
      const [tab, setTab] = useState('overview');
      const [editingUser, setEditingUser] = useState(null);
      const [editInvestments, setEditInvestments] = useState({});
      const [editingCompanies, setEditingCompanies] = useState(false);
      const [tempCompanies, setTempCompanies] = useState([]);
      const [resetPasswordUser, setResetPasswordUser] = useState(null);
      const [newPassword, setNewPassword] = useState('');

      const participantCount = Object.keys(session.participants).length;
      const investmentCount = Object.keys(session.investments).length;

      const copyToClipboard = (text) => { navigator.clipboard.writeText(text); alert('Kopiert!'); };
      const startPhase = (phase) => updateSession({ phase });
      const revealNext = () => updateSession({ revealedRanks: session.revealedRanks + 1 });
      const publishResults = () => updateSession({ resultsPublished: true, phase: 'finished' });

      const saveUserInvestments = (userName) => {
        const current = Storage.getSession(session.code);
        updateSession({ investments: { ...current.investments, [userName]: editInvestments } });
        setEditingUser(null);
      };

      const resetPassword = () => {
        if (!newPassword || newPassword.length < 3) { alert('Kennwort min. 3 Zeichen!'); return; }
        const current = Storage.getSession(session.code);
        const updatedParticipants = { ...current.participants, [resetPasswordUser]: { ...current.participants[resetPasswordUser], password: newPassword } };
        updateSession({ participants: updatedParticipants });
        setResetPasswordUser(null);
        setNewPassword('');
        alert(`Kennwort für "${resetPasswordUser}" wurde zurückgesetzt.`);
      };

      const deleteUser = (userName) => {
        if (!confirm(`"${userName}" wirklich löschen?`)) return;
        const current = Storage.getSession(session.code);
        const { [userName]: _, ...restParticipants } = current.participants;
        const { [userName]: __, ...restInvestments } = current.investments;
        const updatedCompanies = current.companies.map(c => ({ ...c, members: c.members.filter(m => m !== userName) }));
        updateSession({ participants: restParticipants, investments: restInvestments, companies: updatedCompanies });
      };

      const startEditCompanies = () => { setTempCompanies(JSON.parse(JSON.stringify(session.companies))); setEditingCompanies(true); };
      const saveCompanies = () => { if (tempCompanies.some(c => !c.name.trim())) { alert('Alle Gruppen brauchen Namen!'); return; } updateSession({ companies: tempCompanies }); setEditingCompanies(false); };

      const rankings = session.companies.map(c => {
        const total = Object.values(session.investments).flatMap(inv => Object.entries(inv)).filter(([id]) => parseInt(id) === c.id).reduce((sum, [, amt]) => sum + amt, 0);
        return { ...c, total };
      }).sort((a, b) => b.total - a.total).map((c, i) => ({ ...c, rank: i + 1 }));

      return (
        <div style={{ minHeight: '100vh', background: 'linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%)' }}>
          <header style={{ background: '#16213e', padding: '1rem 2rem', borderBottom: '2px solid #e94560', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '1rem' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
              <div style={{ width: '40px', height: '40px', background: 'linear-gradient(135deg, #e94560, #ff6b6b)', borderRadius: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.2rem' }}>💰</div>
              <div><h1 style={{ margin: 0, fontSize: '1.3rem', color: '#fff' }}>{session.courseName}</h1><p style={{ margin: 0, color: '#a0a0a0', fontSize: '0.8rem' }}>Admin</p></div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}><span className="live-indicator">LIVE</span><button className="btn btn-secondary" onClick={onLogout}>Logout</button></div>
          </header>

          <div style={{ background: 'linear-gradient(135deg, #e94560, #ff6b6b)', padding: '1.5rem 2rem' }}>
            <div style={{ maxWidth: '1200px', margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '1rem' }}>
              <div><div style={{ fontSize: '0.85rem', opacity: 0.9 }}>Session-Code:</div><div style={{ fontSize: '2.5rem', fontWeight: '900', letterSpacing: '0.3rem' }}>{session.code}</div></div>
              <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
                <button className="btn" style={{ background: 'rgba(255,255,255,0.2)' }} onClick={() => copyToClipboard(session.code)}>📋 Code</button>
                <button className="btn" style={{ background: 'rgba(255,255,255,0.2)' }} onClick={() => copyToClipboard(`${location.origin}${location.pathname}?join=${session.code}`)}>🔗 Link</button>
                <button className="btn" style={{ background: 'rgba(255,255,255,0.2)' }} onClick={() => generatePDF(session)}>📄 PDF</button>
              </div>
            </div>
          </div>

          <div style={{ padding: '2rem', maxWidth: '1400px', margin: '0 auto' }}>
            <div className="tabs">
              {['overview', 'groups', 'participants', 'investments', 'results'].map(t => (
                <button key={t} className={`tab ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>
                  {t === 'overview' ? '📊 Übersicht' : t === 'groups' ? '🏢 Gruppen' : t === 'participants' ? '👥 Teilnehmer' : t === 'investments' ? '💰 Investments' : '🏆 Ergebnisse'}
                </button>
              ))}
            </div>

            {/* OVERVIEW */}
            {tab === 'overview' && (
              <>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem', marginBottom: '2rem' }}>
                  <div className="card"><div style={{ color: '#a0a0a0', fontSize: '0.85rem' }}>Phase</div><div style={{ color: session.phase === 'registration' ? '#FFEAA7' : session.phase === 'investing' ? '#4ECDC4' : '#e94560', fontSize: '1.3rem', fontWeight: '700' }}>{session.phase === 'registration' ? '📝 Registrierung' : session.phase === 'investing' ? '💎 Investment' : session.phase === 'reveal' ? '🎬 Auflösung' : '✅ Beendet'}</div></div>
                  <div className="card" style={{ borderColor: participantCount > 0 ? '#4ECDC4' : '#333' }}><div style={{ color: '#a0a0a0', fontSize: '0.85rem' }}>Teilnehmer</div><div style={{ color: '#fff', fontSize: '1.3rem', fontWeight: '700' }}>{participantCount} / {session.studentCount}</div></div>
                  <div className="card"><div style={{ color: '#a0a0a0', fontSize: '0.85rem' }}>Investments</div><div style={{ color: '#fff', fontSize: '1.3rem', fontWeight: '700' }}>{investmentCount} / {participantCount}</div></div>
                  <div className="card"><div style={{ color: '#a0a0a0', fontSize: '0.85rem' }}>Ergebnisse</div><div style={{ color: session.resultsPublished ? '#4ECDC4' : '#FFEAA7', fontSize: '1.3rem', fontWeight: '700' }}>{session.resultsPublished ? '✅ Veröffentlicht' : '🔒 Gesperrt'}</div></div>
                </div>
                <div className="card" style={{ marginBottom: '2rem' }}>
                  <h3 style={{ color: '#fff', marginBottom: '1rem' }}>🎮 Spielsteuerung</h3>
                  <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap' }}>
                    {session.phase === 'registration' && <button className="btn btn-success" disabled={participantCount < 3} onClick={() => startPhase('investing')}>▶️ Investment-Phase {participantCount < 3 && '(min. 3)'}</button>}
                    {session.phase === 'investing' && <button className="btn btn-primary" disabled={investmentCount < participantCount} onClick={() => startPhase('reveal')}>🎬 Auflösung {investmentCount < participantCount && `(${investmentCount}/${participantCount})`}</button>}
                    {session.phase === 'reveal' && session.revealedRanks < session.params.groups && <button className="btn btn-primary" style={{ animation: 'pulse 1.5s infinite' }} onClick={revealNext}>🎬 Platz {session.params.groups - session.revealedRanks} enthüllen</button>}
                    {session.phase === 'reveal' && session.revealedRanks >= session.params.groups && !session.resultsPublished && <button className="btn btn-success" onClick={publishResults}>📢 Ergebnisse freigeben</button>}
                    {session.resultsPublished && <span className="badge badge-success" style={{ padding: '0.8rem 1.5rem', fontSize: '1rem' }}>✅ Spiel beendet</span>}
                  </div>
                </div>
                <h3 style={{ color: '#fff', marginBottom: '1rem' }}>👥 Gruppen</h3>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '1rem' }}>
                  {session.companies.map((c, idx) => {
                    const members = c.members.length; const max = session.params.groupSizes[idx]; const isFull = members >= max;
                    return (
                      <div key={c.id} className="card" style={{ borderColor: `${c.color}40` }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1rem' }}>
                          <div style={{ width: '40px', height: '40px', background: c.color, borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>🏢</div>
                          <div><div style={{ color: '#fff', fontWeight: '600' }}>{c.name}</div><div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}><span style={{ color: '#a0a0a0', fontSize: '0.8rem' }}>{members}/{max}</span>{isFull ? <span className="badge badge-success">Voll</span> : <span className="badge badge-warning">Offen</span>}</div></div>
                        </div>
                        {c.slogan && <p style={{ color: '#666', fontSize: '0.8rem', fontStyle: 'italic', marginBottom: '0.75rem' }}>„{c.slogan}"</p>}
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.4rem' }}>{c.members.length > 0 ? c.members.map(m => (<span key={m} style={{ padding: '0.3rem 0.6rem', background: session.investments[m] ? 'rgba(78,205,196,0.3)' : 'rgba(255,255,255,0.1)', borderRadius: '4px', fontSize: '0.8rem', color: session.investments[m] ? '#4ECDC4' : '#ccc' }}>{m} {session.investments[m] && '✅'}</span>)) : <span style={{ color: '#666', fontStyle: 'italic' }}>Keine Mitglieder</span>}</div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}

            {/* GROUPS */}
            {tab === 'groups' && (
              <div className="card">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                  <h3 style={{ color: '#fff', margin: 0 }}>🏢 Gruppen bearbeiten</h3>
                  {!editingCompanies ? <button className="btn btn-primary" onClick={startEditCompanies}>✏️ Bearbeiten</button> : <div style={{ display: 'flex', gap: '0.5rem' }}><button className="btn btn-secondary" onClick={() => setEditingCompanies(false)}>Abbrechen</button><button className="btn btn-success" onClick={saveCompanies}>💾 Speichern</button></div>}
                </div>
                {!editingCompanies ? (
                  <table><thead><tr><th>#</th><th>Farbe</th><th>Name</th><th>Slogan</th><th>Mitglieder</th></tr></thead><tbody>
                    {session.companies.map((c, idx) => (<tr key={c.id}><td>{idx + 1}</td><td><div style={{ width: '24px', height: '24px', background: c.color, borderRadius: '4px' }} /></td><td style={{ fontWeight: '600' }}>{c.name}</td><td style={{ color: '#a0a0a0', fontStyle: 'italic' }}>{c.slogan || '-'}</td><td>{c.members.length} / {session.params.groupSizes[idx]}</td></tr>))}
                  </tbody></table>
                ) : (
                  <div style={{ display: 'grid', gap: '1rem' }}>
                    {tempCompanies.map((c) => (
                      <div key={c.id} style={{ display: 'flex', gap: '1rem', alignItems: 'center', padding: '1rem', background: 'rgba(0,0,0,0.2)', borderRadius: '8px', borderLeft: `4px solid ${c.color}` }}>
                        <div><div style={{ color: '#a0a0a0', fontSize: '0.75rem', marginBottom: '0.25rem' }}>Farbe</div><div className="color-picker">{COLORS.slice(0, 8).map(color => (<div key={color} className={`color-option ${c.color === color ? 'selected' : ''}`} style={{ background: color, width: '24px', height: '24px' }} onClick={() => setTempCompanies(prev => prev.map(x => x.id === c.id ? { ...x, color } : x))} />))}</div></div>
                        <div style={{ flex: 1 }}><div style={{ color: '#a0a0a0', fontSize: '0.75rem', marginBottom: '0.25rem' }}>Name *</div><input type="text" value={c.name} onChange={(e) => setTempCompanies(prev => prev.map(x => x.id === c.id ? { ...x, name: e.target.value } : x))} style={{ padding: '0.5rem' }} /></div>
                        <div style={{ flex: 1 }}><div style={{ color: '#a0a0a0', fontSize: '0.75rem', marginBottom: '0.25rem' }}>Slogan</div><input type="text" value={c.slogan} onChange={(e) => setTempCompanies(prev => prev.map(x => x.id === c.id ? { ...x, slogan: e.target.value } : x))} style={{ padding: '0.5rem' }} placeholder="Optional" /></div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* PARTICIPANTS */}
            {tab === 'participants' && (
              <div className="card">
                <h3 style={{ color: '#fff', marginBottom: '1rem' }}>👥 Teilnehmer ({participantCount})</h3>
                {participantCount === 0 ? <p style={{ color: '#666' }}>Keine Teilnehmer.</p> : (
                  <table><thead><tr><th>Name</th><th>Gruppe</th><th>Status</th><th>Registriert</th><th>Aktionen</th></tr></thead><tbody>
                    {Object.entries(session.participants).map(([name, data]) => {
                      const group = session.companies.find(c => c.id === data.groupId);
                      const hasInvested = !!session.investments[name];
                      return (
                        <tr key={name}>
                          <td style={{ fontWeight: '600' }}>{name}</td>
                          <td><span style={{ color: group?.color }}>{group?.name || '-'}</span></td>
                          <td>{hasInvested ? <span className="badge badge-success">Investiert</span> : <span className="badge badge-warning">Ausstehend</span>}</td>
                          <td style={{ color: '#666', fontSize: '0.85rem' }}>{new Date(data.joinedAt).toLocaleString('de-DE')}</td>
                          <td>
                            <button className="btn btn-secondary" style={{ padding: '0.3rem 0.6rem', fontSize: '0.8rem', marginRight: '0.5rem' }} onClick={() => { setEditingUser(name); setEditInvestments(session.investments[name] || session.companies.reduce((a, c) => ({ ...a, [c.id]: 0 }), {})); }} title="Investment bearbeiten">✏️</button>
                            <button className="btn" style={{ padding: '0.3rem 0.6rem', fontSize: '0.8rem', marginRight: '0.5rem', background: 'rgba(255,234,167,0.2)', color: '#FFEAA7' }} onClick={() => setResetPasswordUser(name)} title="Kennwort zurücksetzen">🔑</button>
                            <button className="btn" style={{ padding: '0.3rem 0.6rem', fontSize: '0.8rem', background: 'rgba(233,69,96,0.2)', color: '#e94560' }} onClick={() => deleteUser(name)} title="Löschen">🗑️</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody></table>
                )}

                {/* Edit Investment Modal */}
                {editingUser && (
                  <div className="modal-overlay">
                    <div className="card modal">
                      <h3 style={{ color: '#fff', marginBottom: '1rem' }}>✏️ Investment: {editingUser}</h3>
                      {session.companies.map(c => (
                        <div key={c.id} style={{ marginBottom: '1rem' }}>
                          <label style={{ color: '#a0a0a0', fontSize: '0.85rem', display: 'flex', justifyContent: 'space-between' }}><span style={{ color: c.color }}>{c.name}</span><span>{editInvestments[c.id] || 0} €</span></label>
                          <input type="range" min="0" max="1000" step="50" value={editInvestments[c.id] || 0} onChange={(e) => setEditInvestments(prev => ({ ...prev, [c.id]: parseInt(e.target.value) }))} style={{ background: `linear-gradient(to right, ${c.color} ${(editInvestments[c.id] || 0) / 10}%, #333 ${(editInvestments[c.id] || 0) / 10}%)` }} />
                        </div>
                      ))}
                      <p style={{ color: Object.values(editInvestments).reduce((a, b) => a + b, 0) === 1000 ? '#4ECDC4' : '#e94560', marginBottom: '1rem' }}>Summe: {Object.values(editInvestments).reduce((a, b) => a + b, 0)} € (muss 1.000 €)</p>
                      <div style={{ display: 'flex', gap: '0.5rem' }}><button className="btn btn-secondary" style={{ flex: 1 }} onClick={() => setEditingUser(null)}>Abbrechen</button><button className="btn btn-success" style={{ flex: 1 }} disabled={Object.values(editInvestments).reduce((a, b) => a + b, 0) !== 1000} onClick={() => saveUserInvestments(editingUser)}>Speichern</button></div>
                    </div>
                  </div>
                )}

                {/* Reset Password Modal */}
                {resetPasswordUser && (
                  <div className="modal-overlay">
                    <div className="card modal">
                      <h3 style={{ color: '#fff', marginBottom: '1rem' }}>🔑 Kennwort zurücksetzen</h3>
                      <p style={{ color: '#a0a0a0', marginBottom: '1rem' }}>Neues Kennwort für <strong style={{ color: '#fff' }}>{resetPasswordUser}</strong>:</p>
                      <input type="text" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} placeholder="Neues Kennwort (min. 3 Zeichen)" style={{ marginBottom: '1rem' }} />
                      <div style={{ display: 'flex', gap: '0.5rem' }}>
                        <button className="btn btn-secondary" style={{ flex: 1 }} onClick={() => { setResetPasswordUser(null); setNewPassword(''); }}>Abbrechen</button>
                        <button className="btn btn-success" style={{ flex: 1 }} disabled={newPassword.length < 3} onClick={resetPassword}>Kennwort setzen</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* INVESTMENTS */}
            {tab === 'investments' && (
              <div className="card">
                <h3 style={{ color: '#fff', marginBottom: '1rem' }}>💰 Investments</h3>
                {investmentCount === 0 ? <p style={{ color: '#666' }}>Keine Investments.</p> : (
                  <div style={{ overflowX: 'auto' }}>
                    <table><thead><tr><th>Teilnehmer</th>{session.companies.map(c => <th key={c.id} style={{ color: c.color }}>{c.name}</th>)}<th>Summe</th></tr></thead><tbody>
                      {Object.entries(session.investments).map(([name, inv]) => (<tr key={name}><td style={{ fontWeight: '600' }}>{name}</td>{session.companies.map(c => (<td key={c.id} style={{ color: inv[c.id] > 0 ? c.color : '#666' }}>{inv[c.id] || 0} €</td>))}<td style={{ fontWeight: '600' }}>{Object.values(inv).reduce((a, b) => a + b, 0)} €</td></tr>))}
                      <tr style={{ background: 'rgba(255,255,255,0.05)' }}><td style={{ fontWeight: '700' }}>GESAMT</td>{session.companies.map(c => { const total = Object.values(session.investments).reduce((sum, inv) => sum + (inv[c.id] || 0), 0); return <td key={c.id} style={{ fontWeight: '700', color: c.color }}>{total} €</td>; })}<td></td></tr>
                    </tbody></table>
                  </div>
                )}
              </div>
            )}

            {/* RESULTS */}
            {tab === 'results' && (
              <>
                <div className="card" style={{ marginBottom: '1.5rem' }}>
                  <h3 style={{ color: '#fff', marginBottom: '1rem' }}>🏆 Ranking</h3>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem' }}>
                    {rankings.map(r => (
                      <div key={r.id} style={{ background: `linear-gradient(135deg, ${r.color}22, ${r.color}11)`, borderRadius: '12px', padding: '1.25rem', border: `2px solid ${r.color}`, position: 'relative' }}>
                        {r.rank <= 3 && <div style={{ position: 'absolute', top: '-10px', right: '-10px', width: '40px', height: '40px', background: r.rank === 1 ? '#FFD700' : r.rank === 2 ? '#C0C0C0' : '#CD7F32', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{r.rank === 1 ? '🥇' : r.rank === 2 ? '🥈' : '🥉'}</div>}
                        <div style={{ fontWeight: '700', color: '#fff' }}>{r.name}</div><div style={{ color: r.color, fontWeight: '700', fontSize: '1.3rem' }}>{formatCurrency(r.total)}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="card">
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}><h3 style={{ color: '#fff' }}>💰 Investoren</h3><button className="btn btn-secondary" onClick={() => generatePDF(session)}>📄 PDF</button></div>
                  {investmentCount > 0 ? (
                    <table><thead><tr><th>#</th><th>Investor</th><th>Rückfluss</th><th>+/-</th></tr></thead><tbody>
                      {Object.entries(session.investments).map(([inv, invs]) => { let ret = 0; Object.entries(invs).forEach(([cId, amt]) => { const rank = rankings.find(r => r.id === parseInt(cId))?.rank; if (rank === 1) ret += amt * 5; else if (rank === 2) ret += amt; }); return { investor: inv, returned: ret, profit: ret - 1000 }; }).sort((a, b) => b.returned - a.returned).map((inv, i) => (
                        <tr key={inv.investor}><td><span style={{ background: i === 0 ? '#FFD700' : i === 1 ? '#C0C0C0' : i === 2 ? '#CD7F32' : '#333', color: i < 3 ? '#1a1a2e' : '#fff', padding: '0.2rem 0.5rem', borderRadius: '4px', fontWeight: '700' }}>{i + 1}</span></td><td style={{ fontWeight: '600' }}>{inv.investor}</td><td style={{ fontWeight: '600' }}>{formatCurrency(inv.returned)}</td><td style={{ color: inv.profit > 0 ? '#4ECDC4' : inv.profit < 0 ? '#e94560' : '#fff', fontWeight: '600' }}>{inv.profit > 0 ? '+' : ''}{formatCurrency(inv.profit)}</td></tr>
                      ))}
                    </tbody></table>
                  ) : <p style={{ color: '#666' }}>Keine Investments.</p>}
                </div>
              </>
            )}
          </div>
        </div>
      );
    };

    // ============ STUDENT DASHBOARD ============
    const StudentDashboard = ({ initialSession, username, onLogout }) => {
      const [session, setSession, updateSession] = useLiveSession(initialSession.code, initialSession);
      const [investments, setInvestments] = useState(session.companies.reduce((a, c) => ({ ...a, [c.id]: 0 }), {}));
      const [submitted, setSubmitted] = useState(!!session.investments[username]);
      const [error, setError] = useState('');
      const BUDGET = 1000;

      const userGroup = session.participants[username]?.groupId;
      const total = Object.values(investments).reduce((a, b) => a + b, 0);
      const count = Object.values(investments).filter(v => v > 0).length;
      const remaining = BUDGET - total;

      useEffect(() => { if (session.investments[username]) setSubmitted(true); }, [session.investments, username]);

      const handleSubmit = () => {
        if (total !== BUDGET) { setError(`Genau ${formatCurrency(BUDGET)} investieren!`); return; }
        if (count < session.params.minInvestments) { setError(`Min. ${session.params.minInvestments} Investments!`); return; }
        const current = Storage.getSession(session.code);
        updateSession({ investments: { ...current.investments, [username]: investments } });
        setSubmitted(true);
      };

      const rankings = session.companies.map(c => { const t = Object.values(session.investments).flatMap(inv => Object.entries(inv)).filter(([id]) => parseInt(id) === c.id).reduce((sum, [, amt]) => sum + amt, 0); return { ...c, total: t }; }).sort((a, b) => b.total - a.total).map((c, i) => ({ ...c, rank: i + 1 }));

      return (
        <div style={{ minHeight: '100vh', background: 'linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%)' }}>
          <header style={{ background: '#16213e', padding: '1rem 1.5rem', borderBottom: '2px solid #4ECDC4', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '0.5rem' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}><div style={{ width: '35px', height: '35px', background: 'linear-gradient(135deg, #4ECDC4, #45B7D1)', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>💰</div><div><h1 style={{ margin: 0, fontSize: '1.1rem', color: '#fff' }}>{session.courseName}</h1><p style={{ margin: 0, color: '#a0a0a0', fontSize: '0.75rem' }}>Hallo, {username}!</p></div></div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}><span className="live-indicator">LIVE</span><button className="btn btn-secondary" style={{ padding: '0.4rem 0.8rem', fontSize: '0.8rem' }} onClick={onLogout}>Logout</button></div>
          </header>

          <div style={{ padding: '1.5rem', maxWidth: '800px', margin: '0 auto' }}>
            {session.phase === 'registration' && (
              <div className="fade-in" style={{ textAlign: 'center', padding: '3rem 1rem' }}>
                <div style={{ fontSize: '4rem', marginBottom: '1rem' }}>⏳</div><h2 style={{ color: '#fff', marginBottom: '0.5rem' }}>Warte auf Start</h2><p style={{ color: '#a0a0a0', marginBottom: '2rem' }}>Der Dozent startet bald.</p>
                <div className="card"><h3 style={{ color: '#fff', marginBottom: '1rem' }}>Dein Team:</h3>{session.companies.filter(c => c.id === userGroup).map(c => (<div key={c.id} style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}><div style={{ width: '50px', height: '50px', background: c.color, borderRadius: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.5rem' }}>🏢</div><div><div style={{ color: '#fff', fontWeight: '600', fontSize: '1.1rem' }}>{c.name}</div><div style={{ color: '#a0a0a0', fontSize: '0.85rem' }}>{c.members.join(', ')}</div></div></div>))}</div>
              </div>
            )}

            {session.phase === 'investing' && !submitted && (
              <div className="fade-in">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem', flexWrap: 'wrap', gap: '1rem' }}>
                  <div><h2 style={{ margin: 0, color: '#fff' }}>💎 Investment</h2><p style={{ color: '#a0a0a0', fontSize: '0.85rem' }}>Min. {session.params.minInvestments} Teams</p></div>
                  <div style={{ display: 'flex', gap: '0.75rem' }}>
                    <div style={{ padding: '0.75rem 1rem', background: remaining === 0 ? 'linear-gradient(135deg, #4ECDC4, #45B7D1)' : 'linear-gradient(135deg, #e94560, #ff6b6b)', borderRadius: '10px', textAlign: 'center' }}><div style={{ fontSize: '1.2rem', fontWeight: '900', color: remaining === 0 ? '#1a1a2e' : '#fff' }}>{formatCurrency(remaining)}</div><div style={{ fontSize: '0.65rem', color: remaining === 0 ? '#1a1a2e' : '#fff' }}>Verfügbar</div></div>
                    <div style={{ padding: '0.75rem 1rem', background: count >= session.params.minInvestments ? 'linear-gradient(135deg, #4ECDC4, #45B7D1)' : '#1e1e30', borderRadius: '10px', textAlign: 'center', border: count >= session.params.minInvestments ? 'none' : '1px solid #333' }}><div style={{ fontSize: '1.2rem', fontWeight: '900', color: count >= session.params.minInvestments ? '#1a1a2e' : '#fff' }}>{count}/{session.params.minInvestments}</div><div style={{ fontSize: '0.65rem', color: count >= session.params.minInvestments ? '#1a1a2e' : '#fff' }}>Teams</div></div>
                  </div>
                </div>
                {error && <div style={{ padding: '0.75rem', background: 'rgba(233,69,96,0.2)', border: '1px solid #e94560', borderRadius: '8px', color: '#ff6b6b', marginBottom: '1rem' }}>⚠️ {error}</div>}
                {session.companies.map(c => (
                  <div key={c.id} className="card" style={{ marginBottom: '0.75rem', borderColor: investments[c.id] > 0 ? c.color : '#333' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.75rem' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}><div style={{ width: '35px', height: '35px', background: c.color, borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}>🏢{c.id === userGroup && <span style={{ position: 'absolute', top: '-5px', right: '-5px', fontSize: '0.6rem' }}>⭐</span>}</div><div><div style={{ color: '#fff', fontWeight: '600' }}>{c.name} {c.id === userGroup && '(Du)'}</div><div style={{ color: '#a0a0a0', fontSize: '0.75rem' }}>{c.slogan}</div></div></div>
                      <div style={{ padding: '0.4rem 0.8rem', background: investments[c.id] > 0 ? c.color : 'rgba(255,255,255,0.1)', borderRadius: '6px', fontWeight: '700', color: investments[c.id] > 0 ? '#1a1a2e' : '#666', minWidth: '80px', textAlign: 'center' }}>{formatCurrency(investments[c.id])}</div>
                    </div>
                    <input type="range" min="0" max={BUDGET} step="50" value={investments[c.id]} onChange={(e) => { const val = parseInt(e.target.value); const other = Object.entries(investments).filter(([id]) => parseInt(id) !== c.id).reduce((s, [, v]) => s + v, 0); if (other + val <= BUDGET) setInvestments(prev => ({ ...prev, [c.id]: val })); }} style={{ width: '100%', background: `linear-gradient(to right, ${c.color} ${investments[c.id] / 10}%, #333 ${investments[c.id] / 10}%)` }} />
                  </div>
                ))}
                <button className="btn btn-primary" style={{ width: '100%', marginTop: '1rem', padding: '1rem' }} disabled={remaining !== 0 || count < session.params.minInvestments} onClick={handleSubmit}>🔒 Abschließen</button>
              </div>
            )}

            {session.phase === 'investing' && submitted && (
              <div className="fade-in" style={{ textAlign: 'center', padding: '3rem 1rem' }}>
                <div style={{ width: '80px', height: '80px', margin: '0 auto 1.5rem', background: 'linear-gradient(135deg, #4ECDC4, #45B7D1)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '2.5rem' }}>✓</div>
                <h2 style={{ color: '#fff', marginBottom: '0.5rem' }}>Abgegeben!</h2><p style={{ color: '#a0a0a0' }}>Warte auf Auflösung.</p>
                <p style={{ color: '#666', fontSize: '0.85rem', marginTop: '1rem' }}>{Object.keys(session.investments).length} / {Object.keys(session.participants).length}</p>
              </div>
            )}

            {session.phase === 'reveal' && !session.resultsPublished && (
              <div className="fade-in" style={{ textAlign: 'center', padding: '3rem 1rem' }}><div style={{ fontSize: '4rem', marginBottom: '1rem' }}>🎬</div><h2 style={{ color: '#fff', marginBottom: '0.5rem' }}>Auflösung...</h2><p style={{ color: '#a0a0a0' }}>Schau auf die Leinwand!</p></div>
            )}

            {session.resultsPublished && (
              <div className="fade-in">
                <h2 style={{ color: '#fff', marginBottom: '1rem' }}>🏆 Ergebnisse</h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '1rem', marginBottom: '2rem' }}>
                  {rankings.map(r => (<div key={r.id} style={{ background: `linear-gradient(135deg, ${r.color}22, ${r.color}11)`, borderRadius: '12px', padding: '1rem', border: `2px solid ${r.color}`, position: 'relative' }}>{r.rank <= 3 && <div style={{ position: 'absolute', top: '-8px', right: '-8px', width: '32px', height: '32px', background: r.rank === 1 ? '#FFD700' : r.rank === 2 ? '#C0C0C0' : '#CD7F32', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.9rem' }}>{r.rank === 1 ? '🥇' : r.rank === 2 ? '🥈' : '🥉'}</div>}<div style={{ fontWeight: '600', color: '#fff', fontSize: '0.9rem' }}>{r.name}</div><div style={{ color: r.color, fontWeight: '700', fontSize: '1.1rem' }}>{formatCurrency(r.total)}</div></div>))}
                </div>
                {session.investments[username] && (
                  <div className="card" style={{ marginBottom: '1.5rem', borderColor: '#4ECDC4' }}>
                    <h3 style={{ color: '#4ECDC4', marginBottom: '1rem' }}>📊 Dein Ergebnis</h3>
                    {(() => { const inv = session.investments[username]; let ret = 0; const details = []; Object.entries(inv).forEach(([cId, amt]) => { if (amt > 0) { const c = rankings.find(r => r.id === parseInt(cId)); const gain = c.rank === 1 ? amt * 5 : c.rank === 2 ? amt : 0; ret += gain; details.push({ name: c.name, amt, rank: c.rank, gain }); } });
                      return (<>{details.map((d, i) => (<div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '0.5rem 0', borderBottom: '1px solid #333' }}><span style={{ color: '#a0a0a0' }}>{d.name} (#{d.rank})</span><span><span style={{ color: '#666' }}>{formatCurrency(d.amt)} →</span> <span style={{ color: d.gain > 0 ? '#4ECDC4' : '#e94560', fontWeight: '600' }}>{formatCurrency(d.gain)}</span></span></div>))}<div style={{ display: 'flex', justifyContent: 'space-between', paddingTop: '1rem' }}><span style={{ color: '#fff', fontWeight: '700' }}>Gesamt</span><span style={{ color: ret - 1000 >= 0 ? '#4ECDC4' : '#e94560', fontWeight: '700', fontSize: '1.2rem' }}>{formatCurrency(ret)} ({ret - 1000 >= 0 ? '+' : ''}{formatCurrency(ret - 1000)})</span></div></>);
                    })()}
                    <button className="btn btn-secondary" style={{ width: '100%', marginTop: '1rem' }} onClick={() => generatePDF(session, username)}>📄 PDF</button>
                  </div>
                )}
                <div className="card"><h3 style={{ color: '#fff', marginBottom: '1rem' }}>💰 Rangliste</h3>
                  {Object.entries(session.investments).map(([inv, invs]) => { let ret = 0; Object.entries(invs).forEach(([cId, amt]) => { const rank = rankings.find(r => r.id === parseInt(cId))?.rank; if (rank === 1) ret += amt * 5; else if (rank === 2) ret += amt; }); return { investor: inv, returned: ret, profit: ret - 1000 }; }).sort((a, b) => b.returned - a.returned).map((inv, i) => (
                    <div key={inv.investor} style={{ display: 'flex', alignItems: 'center', padding: '0.75rem', marginBottom: '0.5rem', background: inv.investor === username ? 'rgba(78,205,196,0.2)' : i < 3 ? `rgba(${i === 0 ? '255,215,0' : i === 1 ? '192,192,192' : '205,127,50'}, 0.15)` : 'rgba(0,0,0,0.2)', borderRadius: '8px', border: inv.investor === username ? '2px solid #4ECDC4' : 'none' }}>
                      <div style={{ width: '30px', height: '30px', background: i === 0 ? '#FFD700' : i === 1 ? '#C0C0C0' : i === 2 ? '#CD7F32' : '#333', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: '900', color: i < 3 ? '#1a1a2e' : '#fff', marginRight: '0.75rem', fontSize: '0.8rem' }}>{i + 1}</div>
                      <div style={{ flex: 1 }}><div style={{ color: '#fff', fontWeight: '600', fontSize: '0.9rem' }}>{inv.investor} {inv.investor === username && '(Du)'}</div></div>
                      <div style={{ textAlign: 'right' }}><div style={{ color: inv.profit > 0 ? '#4ECDC4' : inv.profit < 0 ? '#e94560' : '#fff', fontWeight: '700' }}>{formatCurrency(inv.returned)}</div><div style={{ color: inv.profit > 0 ? '#4ECDC4' : '#e94560', fontSize: '0.75rem' }}>{inv.profit > 0 ? '+' : ''}{formatCurrency(inv.profit)}</div></div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ============ MAIN APP ============
    function App() {
      const [screen, setScreen] = useState('start');
      const [session, setSession] = useState(null);
      const [username, setUsername] = useState(null);
      const [sessions, setSessions] = useState([]);
      const [savedLogin, setSavedLogin] = useState(null);

      useEffect(() => { setSessions(Storage.getAllSessions()); setSavedLogin(Storage.getLogin()); const params = new URLSearchParams(window.location.search); if (params.get('join')) setScreen('student-register'); }, []);

      const handleSelectRole = (role, sessionData, user) => {
        if (role === 'admin-new') setScreen('admin-setup');
        else if (role === 'admin' && sessionData) { setSession(sessionData); setScreen('admin'); }
        else if (role === 'student-register') setScreen('student-register');
        else if (role === 'student-login' && sessionData && user) { setSession(sessionData); setUsername(user); setScreen('student'); }
      };

      const handleLogout = () => { Storage.clearLogin(); setSession(null); setUsername(null); setScreen('start'); setSessions(Storage.getAllSessions()); setSavedLogin(null); window.history.replaceState({}, '', window.location.pathname); };

      return (
        <div style={{ color: '#fff' }}>
          {screen === 'start' && <StartScreen onSelectRole={handleSelectRole} sessions={sessions} savedLogin={savedLogin} />}
          {screen === 'admin-setup' && <AdminSetup onComplete={(s) => { setSession(s); setScreen('admin'); }} onBack={() => setScreen('start')} />}
          {screen === 'student-register' && <StudentRegistration onComplete={(s, u) => { setSession(s); setUsername(u); setScreen('student'); }} onBack={() => setScreen('start')} />}
          {screen === 'admin' && session && <AdminDashboard initialSession={session} onLogout={handleLogout} />}
          {screen === 'student' && session && username && <StudentDashboard initialSession={session} username={username} onLogout={handleLogout} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
